# 周投放数据 - 解析规则
# 三投放组（ABC）印尼+泰国地区周汇总短剧投放数据

名称: 周投放数据

# 组别：从「推广名称」推断，A-/B-/C- 分别对应 A组/B组/C组，不含则剔除
组别规则:
  来源列: 推广名称
  匹配:
    - 含: "A-"
      值: A组
    - 含: "B-"
      值: B组
    - 含: "C-"
      值: C组

# 国家：从「剧名」推断，-IDN/-印尼 → 印尼，-THAI/-泰国 → 泰国，不含则剔除（大小写不敏感）
国家规则:
  来源列: 剧名
  匹配:
    - 含: "-IDN" 或 "-印尼"
      值: 印尼
    - 含: "-THAI" 或 "-泰国"
      值: 泰国

# 剧名（纯）：去掉 -IDN/-印尼、-THAI/-泰国 后缀，用于跨国家汇总
剧名纯规则:
  来源列: 剧名
  去除后缀: ["-IDN", "-印尼", "-THAI", "-泰国"]
