# 剧分析配置
# 运行 bash run_analyze.sh --list 可查看所有剧名，将选中的剧名填入下方

# 要分析的剧名（支持单部或多部）
# 单部：剧名: "倾国倾城的爱"
# 多部：剧名: "倾国倾城的爱, 她的择偶经济学, 雪下的寂寞"
# 或 YAML 列表：
# 剧名:
#   - 倾国倾城的爱
#   - 她的择偶经济学
剧名: ""

# 日期范围（留空则使用数据中的全部日期）
开始日期: ""
结束日期: ""

# 数据文件（留空则优先使用 data/statistics.csv，否则取最新 CSV）
# 可填：statistics.csv、data/xxx.csv 或绝对路径
数据文件: ""
