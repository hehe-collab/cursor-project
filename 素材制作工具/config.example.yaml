# 短剧素材制作工具 - 配置示例
# 复制为 config.yaml 并填写

# OpenAI API（必填）
# 直连 OpenAI：只填 api_key，base_url 留空
# API 中转：填 api_key + base_url（从中转平台文档获取）
openai:
  api_key: "sk-xxx"  # 从环境变量 OPENAI_API_KEY 读取也可
  base_url: ""      # 中转时填，如 https://api.xxx.com/v1
  model: "gpt-4o"  # gpt-4o 分析更准，gpt-4o-mini 更省成本

# 分析参数
analyze:
  frame_size: 384        # 抽帧分辨率，越大细节越多
  scenes_per_episode: 24  # 每集最多分析场景数
  hook_max_seconds: 30   # 钩子最长秒数
  max_episodes: 0        # 最多分析集数，0 表示分析全部

# 输出
output:
  materials_count: 20       # 产出素材条数
  # 时长配置：40% 为 15-20 分钟，60% 为 20-30 分钟
  duration_short_ratio: 0.4   # 短时长素材占比
  duration_short_min: 15      # 短时长下限（分钟）
  duration_short_max: 20      # 短时长上限（分钟）
  duration_long_min: 20       # 长时长下限（分钟）
  duration_long_max: 30       # 长时长上限（分钟）
