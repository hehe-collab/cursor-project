<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DramaBagus 批量广告工具</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .btn-group {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-primary {
      background: #e94560;
      color: white;
    }
    .btn-primary:hover { background: #ff6b6b; }
    .btn-primary:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #0f3460;
      color: #eee;
    }
    .btn-secondary:hover { background: #1a4a7a; }
    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-family: "Consolas", "Monaco", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line { margin: 2px 0; }
    .pause-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }
    .pause-overlay.visible {
      display: flex;
    }
    .pause-box {
      background: #16213e;
      padding: 24px;
      border-radius: 12px;
      max-width: 480px;
      text-align: center;
    }
    .pause-box h3 { margin: 0 0 12px; color: #e94560; }
    .pause-box p { margin: 0 0 20px; line-height: 1.6; color: #ccc; }
    .pause-box .btn-group { justify-content: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>DramaBagus 批量广告工具</h1>
    <div class="btn-group">
      <button class="btn-secondary" onclick="openDataFolder()">打开数据目录</button>
      <button class="btn-secondary" onclick="openConfigFolder()">打开配置目录</button>
      <button class="btn-primary" id="btnStart" onclick="start()">开始运行</button>
    </div>
  </div>
  <div class="log-area" id="logArea">点击「开始运行」启动自动化...</div>
  <div class="pause-overlay" id="pauseOverlay">
    <div class="pause-box">
      <h3>⏸ 等待用户操作</h3>
      <p id="pauseMessage"></p>
      <div class="btn-group">
        <button class="btn-secondary" onclick="pauseQuit()">退出</button>
        <button class="btn-primary" onclick="pauseContinue()">继续</button>
      </div>
    </div>
  </div>
  <script>
    const logArea = document.getElementById('logArea');
    const btnStart = document.getElementById('btnStart');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const pauseMessage = document.getElementById('pauseMessage');

    function appendLog(line) {
      const div = document.createElement('div');
      div.className = 'log-line';
      div.textContent = line;
      logArea.appendChild(div);
      logArea.scrollTop = logArea.scrollHeight;
    }

    function start() {
      btnStart.disabled = true;
      logArea.innerHTML = '';
      appendLog('正在启动...');
      window.electronAPI.startAutomation().catch(err => {
        appendLog('❌ ' + (err.message || err));
      }).finally(() => {
        btnStart.disabled = false;
      });
    }

    function openDataFolder() {
      window.electronAPI.openDataFolder();
    }

    function openConfigFolder() {
      window.electronAPI.openConfigFolder();
    }

    function pauseContinue() {
      pauseOverlay.classList.remove('visible');
      window.electronAPI.pauseContinue();
    }

    function pauseQuit() {
      pauseOverlay.classList.remove('visible');
      window.electronAPI.pauseQuit();
    }

    window.electronAPI.onLog(appendLog);
    window.electronAPI.onShowPause((msg) => {
      pauseMessage.textContent = msg;
      pauseOverlay.classList.add('visible');
    });
  </script>
</body>
</html>
