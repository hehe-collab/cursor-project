# 不力看板观测工具 - 配置

# 页面 URL
base_url: "https://adminxyz.dramahub8.com"
login_url: "https://adminxyz.dramahub8.com/login"   # 登录页
dashboard_url: "https://adminxyz.dramahub8.com/statistics"

# 登录表单选择器（短剧管理系统：input.el-input__inner, placeholder="账号"/"密码"）
login:
  username_selector: "input.el-input__inner[placeholder='账号'], input[placeholder='账号']"
  password_selector: "input.el-input__inner[type='password'], input[type='password']"
  submit_selector: "button:has-text('登录'), .el-button:has-text('登录')"

# 看板页 - 需切换到「看板」标签
dashboard:
  kanban_tab_selector: "text=看板, [role=tab]:has-text('看板')"

# 筛选表单
filters:
  # 固定筛选值（文本输入框）
  values:
    推广ID: ""
    推广名称: "xd"
    副名称: ""
    账户: ""
  # 国家列表：每个国家单独截图并一起发送（下拉为单选，逐个切换）。留空则只截一张
  countries: ["印尼", "泰国"]
  # 选择器（Element UI）
  selectors:
    推广ID: "input[placeholder*='推广ID'], input[placeholder*='请输入推广ID']"
    推广名称: "input[placeholder*='推广名称'], input[placeholder*='请输入推广名称']"
    副名称: "input[placeholder*='副名称'], input[placeholder*='请输入名称']"
    剧名: "input[placeholder*='剧名'], input[placeholder*='请输入剧名']"
    账户: "input[placeholder*='账户'], input[placeholder*='请输入账户']"
    国家: ".el-form-item:has-text('国家') .el-select, .el-select"   # 国家下拉
    搜索: "button:has-text('搜索')"
    重置: "button:has-text('重置')"

# 防接口限制（降低被限流概率）
anti_rate_limit:
  delay_between_combos: [2, 5]   # 每组筛选间隔：随机 2~5 秒，留空或 [0,0] 则不等待
  wait_after_search_ms: 2500     # 点击搜索后等待数据加载（毫秒）
  click_reset_before_combo: false # 每次填筛选前先点「重置」，可避免 Vue 残留状态

# 截图
screenshot:
  full_page: true
  timeout_ms: 10000

# 定时执行：active 时段内才运行，夜间自动跳过
schedule:
  active_start_hour: 8   # 开始执行的小时（24 小时制）
  active_end_hour: 24   # 结束执行的小时（24 表示到 23:59）
  interval_minutes: 30  # launchd 定时间隔（分钟），仅 setup_launchd.sh 使用
