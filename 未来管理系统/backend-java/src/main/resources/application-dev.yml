# 开发环境（macOS 本地）；与现有 JwtUtil / Druid 约定一致
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/drama_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:2048MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:2048MB}
  jackson:
    time-zone: Asia/Shanghai

# Swagger / SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    persist-authorization: true
    doc-expansion: none
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: com.drama.controller
  paths-to-match: /api/**

jwt:
  # 默认与仓库历史一致，避免本地已登录 Token 因换 secret 批量失效；覆盖请设环境变量 JWT_SECRET
  secret: ${JWT_SECRET:future_admin_secret_jwt_hs256_key_must_be_long_enough_}
  expire-days: 7

aliyun:
  vod:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    region-id: ${ALIYUN_VOD_REGION:cn-shanghai}
    template-group-id: ${ALIYUN_VOD_TEMPLATE_GROUP_ID:}
    storage-location: ${ALIYUN_VOD_STORAGE_LOCATION:}
    domain: ${ALIYUN_VOD_DOMAIN:}

app:
  upload-dir: ${APP_UPLOAD_DIR:${UPLOAD_PATH:/Volumes/存钱罐/cursor项目/未来管理系统/uploads}}

logging:
  level:
    com.drama: DEBUG
    org.springframework: INFO
    org.springdoc: DEBUG
