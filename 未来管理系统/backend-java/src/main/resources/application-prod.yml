# 生产环境：请通过环境变量注入密码与 JWT_SECRET
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:drama_system}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    druid:
      max-active: 20
      initial-size: 2
      min-idle: 2
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    time-zone: Asia/Shanghai

jwt:
  secret: ${JWT_SECRET}
  expire-days: ${JWT_EXPIRE_DAYS:7}

aliyun:
  vod:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    region-id: ${ALIYUN_VOD_REGION:cn-shanghai}

app:
  upload-dir: ${APP_UPLOAD_DIR:${UPLOAD_PATH:/data/uploads}}

logging:
  level:
    com.drama: INFO
    org.springframework: WARN
